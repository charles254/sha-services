services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: sha_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sha_secure_password_2024}
      POSTGRES_DB: sha_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sha_user -d sha_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "4000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sha_user:${DB_PASSWORD:-sha_secure_password_2024}@db:5432/sha_db

volumes:
  pgdata:
